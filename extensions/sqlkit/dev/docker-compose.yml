name: sqlkit-dev
services:
  mysql:
    image: ${MYSQL_IMAGE:?set MYSQL_IMAGE}
    container_name: sqlkit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Ck@2o20...}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sqlkit}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  clickhouse:
    image: ${CLICKHOUSE_IMAGE:?set CLICKHOUSE_IMAGE}
    container_name: sqlkit-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-Ck@2o20...}
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_TCP_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user $${CLICKHOUSE_USER} --password $${CLICKHOUSE_PASSWORD} --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 30
